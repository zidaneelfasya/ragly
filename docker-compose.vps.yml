version: '3.8'

services:
  ragly-app:
    # Replace with your actual Docker Hub image
    # Format: dockerhub-username/image-name:tag
    image: zidaneelfasya/ragly-app:latest
    
    container_name: ragly-app
    
    # Port mapping - adjust as needed
    # Format: host:container
    ports:
      - "3000:3000"
    
    # Load environment variables from .env file
    env_file:
      - .env
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (optional - adjust based on your VPS resources)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 1G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M
    
    # Logging configuration (optional)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Optional: Add networks if you need to connect to other services
# networks:
#   ragly-network:
#     driver: bridge
