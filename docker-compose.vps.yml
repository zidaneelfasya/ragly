version: '3.8'

services:
  ragly-app:
    # Option 1: Use pre-built image from Docker Hub
    image: zidaneelfasya/ragly-app:latest
    
    # Option 2: Build locally with environment variables
    # Uncomment the build section below and comment out the image line above
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
    #     NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    #     NEXT_PUBLIC_SUPABASE_PUBLISHABLE_OR_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_OR_ANON_KEY}
    #     NEXT_PUBLIC_RAG_BASE_URL: ${NEXT_PUBLIC_RAG_BASE_URL}
    #     NEXT_PUBLIC_LLM_SERVICE_URL: ${NEXT_PUBLIC_LLM_SERVICE_URL}
    #     NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    
    container_name: ragly-app
    
    # Port mapping - adjust as needed
    # Format: host:container
    ports:
      - "3000:3000"
    
    # Load environment variables from .env file
    # Note: NEXT_PUBLIC_* variables must be set at BUILD time, not runtime
    env_file:
      - .env
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (optional - adjust based on your VPS resources)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 1G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M
    
    # Logging configuration (optional)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Optional: Add networks if you need to connect to other services
# networks:
#   ragly-network:
#     driver: bridge
