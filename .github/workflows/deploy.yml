name: CI/CD Pipeline - Build and Deploy to VPS

on:
  push:
    branches:
      - main  # Trigger saat push ke branch main
      - master  # Atau master, sesuaikan dengan branch utama Anda
  workflow_dispatch:  # Memungkinkan manual trigger dari GitHub UI

env:
  DOCKER_IMAGE_NAME: zidaneelfasya/ragly-app  # Sesuaikan dengan username Docker Hub Anda
  DOCKER_TAG: latest

jobs:
  build-and-push:
    name: Build Docker Image dan Push ke Docker Hub
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_RAG_BASE_URL=${{ secrets.NEXT_PUBLIC_RAG_BASE_URL }}
            NEXT_PUBLIC_LLM_SERVICE_URL=${{ secrets.NEXT_PUBLIC_LLM_SERVICE_URL }}
            NEXT_PUBLIC_SITE_URL=https://ragly.ibpub.org

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

  deploy-to-vps:
    name: Deploy ke VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "🚀 Starting deployment..."
            
            # Navigasi ke direktori aplikasi
            cd /opt/ragly || exit 1
            
            # Pull image terbaru dari Docker Hub
            echo "📦 Pulling latest Docker image..."
            docker pull ${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_TAG }}
            
            # Stop dan remove container lama
            echo "🛑 Stopping old container..."
            docker-compose -f docker-compose.vps.yml down || true
            
            # Start container baru dengan image terbaru
            echo "▶️ Starting new container..."
            docker-compose -f docker-compose.vps.yml up -d
            
            # Cleanup old images
            echo "🧹 Cleaning up old images..."
            docker image prune -af --filter "until=24h" || true
            
            # Health check
            echo "🏥 Waiting for health check..."
            sleep 10
            
            # Verify container is running
            if docker ps | grep -q ragly-app; then
              echo "✅ Deployment successful! Container is running."
              docker ps | grep ragly-app
            else
              echo "❌ Deployment failed! Container is not running."
              docker-compose -f docker-compose.vps.yml logs --tail=50
              exit 1
            fi

      - name: Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment completed successfully!"
          else
            echo "❌ Deployment failed!"
          fi
